name: Weekly Food Trend Digest

on:
  schedule:
    # 毎週日曜20時JST = UTC 11時（日曜）
    - cron: '0 11 * * 0'
  workflow_dispatch:

jobs:
  weekly-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write private key file
        run: |
          echo "${{ secrets.LINEWORKS_PRIVATE_KEY }}" > /tmp/lineworks_private.key

      - name: Run weekly digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINEWORKS_BOT_ID: ${{ secrets.LINEWORKS_BOT_ID }}
          LINEWORKS_CLIENT_ID: ${{ secrets.LINEWORKS_CLIENT_ID }}
          LINEWORKS_CLIENT_SECRET: ${{ secrets.LINEWORKS_CLIENT_SECRET }}
          LINEWORKS_SERVICE_ACCOUNT: ${{ secrets.LINEWORKS_SERVICE_ACCOUNT }}
          LINEWORKS_PRIVATE_KEY: /tmp/lineworks_private.key
          LINEWORKS_USER_ID: ${{ secrets.LINEWORKS_USER_ID }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          # Notion
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python src/main.py --mode weekly
